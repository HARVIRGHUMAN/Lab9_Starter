<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button id="btn-log">Console Log</button>
      <button id="btn-error">Console Error</button>
      <button id="btn-count">Console Count</button>
      <button id="btn-warn">Console Warn</button>
      <button id="btn-assert">Console Assert</button>
      <button id="btn-clear">Console Clear</button>
      <button id="btn-dir">Console Dir</button>
      <button id="btn-dirxml">Console dirxml</button>
      <button id="btn-group-start">Console Group Start</button>
      <button id="btn-group-end">Console Group End</button>
      <button id="btn-table">Console Table</button>
      <button id="btn-timer-start">Start Timer</button>
      <button id="btn-timer-end">End Timer</button>
      <button id="btn-trace">Console Trace</button>
      <button id="btn-global-error">Trigger a Global Error</button>
    </section>
  </main>

  <script>
    class CalculatorError extends Error {
      constructor(message) {
        super(message);
        this.name = 'CalculatorError';
      }
    }

    class InvalidInputError extends CalculatorError {
      constructor(message, field, value) {
        super(message);
        this.name = 'InvalidInputError';
        this.field = field;
        this.value = value;
      }
    }

    class DivideByZeroError extends CalculatorError {
      constructor(message = 'Cannot divide by zero.') {
        super(message);
        this.name = 'DivideByZeroError';
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      try {
        if (firstNum.trim() === '') {
          throw new InvalidInputError('First number is required.', 'first-num', firstNum);
        }
        if (secondNum.trim() === '') {
          throw new InvalidInputError('Second number is required.', 'second-num', secondNum);
        }
        if (isNaN(Number(firstNum))) {
          throw new InvalidInputError(`"${firstNum}" is not a valid number.`, 'first-num', firstNum);
        }
        if (isNaN(Number(secondNum))) {
          throw new InvalidInputError(`"${secondNum}" is not a valid number.`, 'second-num', secondNum);
        }
        if (operator === '/' && Number(secondNum) === 0) {
          throw new DivideByZeroError();
        }

        let result = eval(`${firstNum} ${operator} ${secondNum}`);
        output.innerHTML = result;
      } catch (err) {
        if (err instanceof InvalidInputError) {
          console.error(`[${err.name}] field=${err.field} value="${err.value}" — ${err.message}`);
          output.innerHTML = `Input error: ${err.message}`;
        } else if (err instanceof DivideByZeroError) {
          console.error(`[${err.name}] ${err.message}`);
          output.innerHTML = `Math error: ${err.message}`;
        } else if (err instanceof CalculatorError) {
          console.error(`[${err.name}] ${err.message}`);
          output.innerHTML = `Calculator error: ${err.message}`;
        } else {
          console.error('Unexpected error:', err);
          output.innerHTML = `Unexpected error: ${err.message}`;
          throw err;
        }
      } finally {
        console.log(`Calculation attempted: ${firstNum} ${operator} ${secondNum}`);
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    const sampleData = [
      { name: 'Alice', age: 30, role: 'Engineer' },
      { name: 'Bob', age: 25, role: 'Designer' },
      { name: 'Carol', age: 35, role: 'Manager' }
    ];

    document.querySelector('#btn-log').addEventListener('click', () => {
      console.log('Hello from console.log!', sampleData[0]);
    });

    document.querySelector('#btn-error').addEventListener('click', () => {
      console.error('This is a console.error message');
    });

    document.querySelector('#btn-count').addEventListener('click', () => {
      console.count('Count button clicks');
    });

    document.querySelector('#btn-warn').addEventListener('click', () => {
      console.warn('This is a console.warn message');
    });

    document.querySelector('#btn-assert').addEventListener('click', () => {
      console.assert(1 === 2, 'Assertion failed: 1 is not equal to 2');
    });

    document.querySelector('#btn-clear').addEventListener('click', () => {
      console.clear();
    });

    document.querySelector('#btn-dir').addEventListener('click', () => {
      console.dir(document.querySelector('form'));
    });

    document.querySelector('#btn-dirxml').addEventListener('click', () => {
      console.dirxml(document.querySelector('main'));
    });

    document.querySelector('#btn-group-start').addEventListener('click', () => {
      console.group('My Group');
      console.log('This message is inside the group');
      console.log('So is this one');
    });

    document.querySelector('#btn-group-end').addEventListener('click', () => {
      console.log('Last message before group ends');
      console.groupEnd();
    });

    document.querySelector('#btn-table').addEventListener('click', () => {
      console.table(sampleData);
    });

    document.querySelector('#btn-timer-start').addEventListener('click', () => {
      console.time('demo-timer');
    });

    document.querySelector('#btn-timer-end').addEventListener('click', () => {
      console.timeEnd('demo-timer');
    });

    document.querySelector('#btn-trace').addEventListener('click', () => {
      function inner() { console.trace('Trace from inner()'); }
      function outer() { inner(); }
      outer();
    });
  </script>
</body>

</html>
